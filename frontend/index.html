<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>meteoearth</title>
  <style>
    html, body { margin: 0; padding: 0; height: 100%; background: #050810;
                 font-family: -apple-system, BlinkMacSystemFont, "Segoe UI",
                              system-ui, sans-serif; color: #cdd6e0; }
    #container { width: 100vw; height: 100vh; position: relative; }

    #info { position: absolute; top: 14px; left: 16px; font-size: 12px;
            line-height: 1.5; pointer-events: none;
            text-shadow: 0 1px 2px rgba(0,0,0,0.8); }
    #info .title { font-size: 14px; font-weight: 600; color: #fff; }
    #info .credit { color: #7f8a9b; font-size: 11px; font-style: italic; }
    #info .meta  { color: #98a3b3; }
    #info .hint  { color: #6c7889; margin-top: 4px; }

    #controls { position: absolute; bottom: 14px; left: 16px; max-width: 230px;
                background: rgba(8, 12, 20, 0.72);
                border: 1px solid rgba(120, 140, 170, 0.18);
                border-radius: 6px; padding: 8px 12px; font-size: 12px;
                backdrop-filter: blur(6px); }
    #controls .ctl-head { display: flex; align-items: center;
                          justify-content: space-between; gap: 12px; }
    #controls .ctl-title { font-weight: 600; color: #fff; }
    #controls .ctl-toggle { cursor: pointer; color: #98a3b3; background: none;
                            border: none; font: inherit; font-size: 16px;
                            line-height: 1; padding: 0 2px; }
    #controls .ctl-toggle:hover { color: #fff; }
    #controls.collapsed #controls-body { display: none; }
    #controls.collapsed { max-width: none; }
    #controls-body { margin-top: 8px; }
    #controls label { display: flex; align-items: center; gap: 10px;
                      color: #cdd6e0; margin: 4px 0; }
    #controls .name  { width: 90px; }
    #controls .value { width: 48px; text-align: right; color: #98a3b3;
                       font-variant-numeric: tabular-nums; }
    #controls input[type="range"] { width: 180px; accent-color: #6aa6ff; }
    #controls .row-overlay { flex-direction: column; align-items: flex-start;
                             gap: 5px; }
    #controls .row-overlay .name { width: auto; color: #98a3b3; }
    #controls .row-overlay .btns { display: flex; flex-wrap: wrap; gap: 5px; }
    #controls .row-overlay button {
      padding: 3px 9px; font: inherit; color: #cdd6e0;
      background: rgba(60, 72, 92, 0.5);
      border: 1px solid rgba(120, 140, 170, 0.18);
      border-radius: 4px; cursor: pointer;
    }
    #controls .row-overlay button.active {
      background: rgba(106, 166, 255, 0.25);
      border-color: rgba(106, 166, 255, 0.55);
      color: #fff;
    }
    #controls .row-overlay button:disabled,
    #controls .row-overlay button.unavail {
      opacity: 0.35; cursor: not-allowed;
    }
    #controls hr { border: none; height: 1px;
                    background: rgba(120, 140, 170, 0.18); margin: 8px 0; }

    #timebar { position: absolute; bottom: 14px; left: 50%;
               transform: translateX(-50%);
               display: flex; align-items: center; gap: 10px;
               background: rgba(8, 12, 20, 0.72);
               border: 1px solid rgba(120, 140, 170, 0.18);
               border-radius: 6px; padding: 8px 14px; font-size: 12px;
               backdrop-filter: blur(6px); }
    #timebar button { padding: 3px 9px; font: inherit; color: #cdd6e0;
               background: rgba(60, 72, 92, 0.5);
               border: 1px solid rgba(120, 140, 170, 0.18);
               border-radius: 4px; cursor: pointer; min-width: 30px; }
    #timebar button.active { background: rgba(106, 166, 255, 0.25);
               border-color: rgba(106, 166, 255, 0.55); color: #fff; }
    #timebar input[type="range"] { width: 300px; accent-color: #6aa6ff; }
    #timebar .tb-label { min-width: 168px; color: #f0f4f8;
               font-variant-numeric: tabular-nums; }
    #timebar .tb-label .lead { color: #98a3b3; }

    #hover-badge { position: fixed; pointer-events: none;
                   background: rgba(8, 12, 20, 0.85);
                   border: 1px solid rgba(120, 140, 170, 0.25);
                   border-radius: 4px; padding: 6px 10px;
                   font-size: 11px; line-height: 1.45;
                   color: #cdd6e0; white-space: pre;
                   font-variant-numeric: tabular-nums;
                   display: none; z-index: 10;
                   box-shadow: 0 2px 8px rgba(0,0,0,0.5); }

    #pin-panel { position: absolute; bottom: 14px; right: 16px;
                 background: rgba(8, 12, 20, 0.85);
                 border: 1px solid rgba(106, 166, 255, 0.35);
                 border-radius: 6px; padding: 10px 14px;
                 font-size: 12px; line-height: 1.5; color: #cdd6e0;
                 min-width: 220px;
                 backdrop-filter: blur(6px); display: none; }
    #pin-panel .head { display: flex; justify-content: space-between;
                        align-items: center; margin-bottom: 6px; }
    #pin-panel .title { font-weight: 600; color: #fff; }
    #pin-panel .close { cursor: pointer; color: #98a3b3;
                        background: none; border: none; padding: 0; font: inherit; }
    #pin-panel .close:hover { color: #fff; }
    #pin-panel .row { display: flex; justify-content: space-between;
                       gap: 18px; font-variant-numeric: tabular-nums; }
    #pin-panel .row .k { color: #98a3b3; }
    #pin-panel .row .v { color: #f0f4f8; }

    #legend { position: absolute; top: 14px; right: 16px;
              background: rgba(8, 12, 20, 0.72);
              border: 1px solid rgba(120, 140, 170, 0.18);
              border-radius: 6px; padding: 10px 14px 14px;
              backdrop-filter: blur(6px); display: none;
              font-size: 11px; color: #cdd6e0; min-width: 240px; }
    #legend .legend-title { font-size: 12px; font-weight: 600; color: #fff;
                              margin-bottom: 6px; }
    #legend .legend-bar   { height: 10px; width: 220px; border-radius: 3px;
                              border: 1px solid rgba(120, 140, 170, 0.25);
                              box-sizing: border-box; }
    #legend .legend-ticks { position: relative; height: 14px; width: 220px;
                              margin-top: 4px; }
    #legend .legend-tick  { position: absolute; transform: translateX(-50%);
                              font-size: 10px; color: #98a3b3;
                              font-variant-numeric: tabular-nums;
                              white-space: nowrap; }
    #legend .legend-tick::before {
      content: ""; display: block; width: 1px; height: 4px;
      background: rgba(120, 140, 170, 0.55);
      margin: -6px auto 1px;
    }
  </style>

  <script src="https://unpkg.com/deck.gl@9.2.6/dist/dist.dev.js"></script>
  <script src="https://unpkg.com/weatherlayers-gl@2026.2.0/dist/weatherlayers-deck.umd.min.js"></script>
</head>
<body>
  <div id="container"></div>

  <div id="info">
    <div class="title">meteoearth</div>
    <div class="credit">crafted by Paul Fishwick &amp; Claude Code</div>
    <div class="meta" id="status">loading…</div>
    <div class="hint">drag · scroll · <b>right-click</b> to pin · <b>Esc</b> to clear</div>
  </div>

  <div id="controls">
    <div class="ctl-head">
      <span class="ctl-title">controls</span>
      <button id="ctl-toggle" class="ctl-toggle" title="minimize">−</button>
    </div>
    <div id="controls-body">
    <label class="row-overlay">
      <span class="name">model</span>
      <span class="btns" id="model-btns"></span>
    </label>
    <label class="row-overlay">
      <span class="name">overlay</span>
      <span class="btns">
        <button data-overlay="none" class="active"
                title="No color overlay — show the wind animation only">none</button>
        <button data-overlay="tmp_2m"
                title="2 m air temperature">temp</button>
        <button data-overlay="rh_2m"
                title="2 m relative humidity (%)">RH</button>
        <button data-overlay="mslp"
                title="Mean sea-level pressure (hPa)">MSLP</button>
        <button data-overlay="cloud_cover"
                title="Total cloud cover (%)">cloud</button>
        <button data-overlay="pwat"
                title="Total precipitable water — moisture in the air column (kg/m²)">PWAT</button>
        <button data-overlay="gust"
                title="Surface wind gusts (m/s)">gust</button>
        <button data-overlay="prate"
                title="Precipitation rate (mm/h)">precip</button>
        <button data-overlay="cape"
                title="CAPE — convective energy, a thunderstorm-potential proxy (J/kg)">CAPE</button>
      </span>
    </label>
    <label class="row-overlay">
      <span class="name">wind level</span>
      <span class="btns">
        <button data-wind="wind_10m" class="active"
                title="Animate surface wind at 10 m above ground">10 m</button>
        <button data-wind="wind_250mb"
                title="Animate upper-level wind at 250 hPa — the jet stream">250 hPa (jet)</button>
      </span>
    </label>
    <label class="row-overlay">
      <span class="name">pressure</span>
      <span class="btns">
        <button data-toggle="highLow" class="active"
                title="Show H / L markers at high- and low-pressure centers">H / L centers</button>
      </span>
    </label>
    <hr>
    <label title="How long each wind particle's trail persists before fading">
      <span class="name">trail length</span>
      <input id="ctl-maxAge" type="range" min="5" max="120" value="40" step="1">
      <span class="value" id="ctl-maxAge-val">40</span>
    </label>
    <label title="How fast the wind particles move">
      <span class="name">speed</span>
      <input id="ctl-speed" type="range" min="0.5" max="10" value="3" step="0.1">
      <span class="value" id="ctl-speed-val">3.0</span>
    </label>
    <label title="How many wind particles are drawn">
      <span class="name">particles</span>
      <input id="ctl-num" type="range" min="500" max="15000" value="5000" step="500">
      <span class="value" id="ctl-num-val">5000</span>
    </label>
    <label title="Thickness of the wind particle lines">
      <span class="name">line width</span>
      <input id="ctl-width" type="range" min="0.5" max="5" value="2" step="0.1">
      <span class="value" id="ctl-width-val">2.0</span>
    </label>
    </div>
  </div>

  <div id="timebar">
    <button id="tb-prev" title="previous step">‹</button>
    <button id="tb-play" title="play / pause">▶</button>
    <button id="tb-next" title="next step">›</button>
    <input id="tb-slider" type="range" min="0" max="0" value="0" step="1"
           title="Scrub through the forecast — analysis (now) out to +48 h">
    <span class="tb-label" id="tb-label"></span>
  </div>

  <div id="hover-badge"></div>

  <div id="legend">
    <div class="legend-title" id="legend-title"></div>
    <div class="legend-bar" id="legend-bar"></div>
    <div class="legend-ticks" id="legend-ticks"></div>
  </div>

  <div id="pin-panel">
    <div class="head">
      <span class="title" id="pin-title">pinned</span>
      <button class="close" id="pin-close">×</button>
    </div>
    <div id="pin-rows"></div>
  </div>

  <script src="./src/main.js"></script>
</body>
</html>
