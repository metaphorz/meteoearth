name: Refresh model data and deploy to Pages

# Rebuilds the data layers from the latest GFS / ECMWF / GEM cycles and deploys
# the static globe to GitHub Pages. The data is generated fresh in CI and
# shipped as the Pages artifact, so it never gets committed back to the repo
# (no history bloat).

on:
  # Run every 12h: GFS, ECMWF, and GEM all publish fresh 00/12 UTC cycles, so
  # this catches new data for all three models (GEM only updates twice a day).
  # Offset to ~07/19 UTC so all three providers (incl. slower ECMWF open data)
  # have finished publishing their 00/12 UTC cycles.
  schedule:
    - cron: "0 7,19 * * *"
  workflow_dispatch: {}      # allow manual "Run workflow" from the Actions tab
  push:
    branches: [main]         # deploy on every push to main

permissions:
  contents: read
  pages: write
  id-token: write

# Never run two deploys at once; let an in-progress one finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30        # 3 models fetch in ~10-15 min; cap so it can't hang
    steps:
      - uses: actions/checkout@v4

      # conda-forge eccodes + cfgrib is the reliable way to decode GRIB2 in CI.
      - uses: mamba-org/setup-micromamba@v2
        with:
          environment-name: gfs
          create-args: >-
            python=3.11
            eccodes
            cfgrib
            xarray
            numpy
            pillow
            requests
          init-shell: bash

      - name: Install ECMWF open-data client
        shell: bash -el {0}
        run: pip install ecmwf-opendata

      - name: Build data layers for all models (GFS, ECMWF, GEM)
        shell: bash -el {0}
        run: |
          python pipeline/build.py
          echo "--- generated data ---"
          du -sh data/*/ ; cat data/index.json | python -c "import sys,json;d=json.load(sys.stdin);print('sources:',[s['id'] for s in d['sources']])"

      - name: Assemble static site
        run: |
          mkdir -p _site/frontend _site/data
          cp -r frontend/* _site/frontend/
          # Ship per-model layers + the index, but never the raw GRIB cache.
          cp data/index.json _site/data/
          for d in data/*/; do
            [ "$d" = "data/raw/" ] && continue
            cp -r "$d" "_site/data/$(basename "$d")"
          done
          touch _site/.nojekyll
          # Root redirect so the site URL opens the globe directly.
          cat > _site/index.html <<'HTML'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <meta http-equiv="refresh" content="0; url=frontend/index.html">
            <title>meteoearth</title>
            <link rel="canonical" href="frontend/index.html">
          </head>
          <body>
            <p>Redirecting to <a href="frontend/index.html">meteoearth</a>…</p>
          </body>
          </html>
          HTML
          echo "--- _site contents ---"
          find _site -maxdepth 2 -type f | sort

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
